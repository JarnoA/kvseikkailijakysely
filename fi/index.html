<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minkälainen seikkailija olet?</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.counter.dev/script.js" data-id="4dd6d014-e826-4cda-8265-b742387017fc" data-utcoffset="2"></script>
</head>
<body>

    <div class="app-container">
        
        <div class="header-scene" id="scene-bg">
            <div class="scene-ui">
                <nav class="lang-switcher">
                    <a href="index.html" class="lang-link active">FI</a>
                    <a href="../en/index.html" class="lang-link">EN</a>
                    <a href="../sv/index.html" class="lang-link">SV</a>
                </nav>
            </div>

            <div class="scene-bg">
                <div class="sun" id="sun"></div>
                <div class="layer layer-back" id="clouds"></div>
                <div class="layer layer-mid" id="mountains-back"></div>
                <div class="layer layer-front" id="mountains-mid"></div>
            </div>

            <div class="character-container" id="avatar-container">
                <!-- Detailed Indiana Jones Ant -->
                <svg id="avatar-svg" width="400" height="400" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" class="character-img">
                  <defs>
                    <radialGradient id="abdG" cx="35%" cy="25%" r="70%">
                      <stop offset="0%" stop-color="#F07040"/>
                      <stop offset="40%" stop-color="#CC3318"/>
                      <stop offset="100%" stop-color="#6E1208"/>
                    </radialGradient>
                    <radialGradient id="abdG2" cx="40%" cy="30%" r="60%">
                      <stop offset="0%" stop-color="#E06030"/>
                      <stop offset="50%" stop-color="#B82C14"/>
                      <stop offset="100%" stop-color="#6E1208"/>
                    </radialGradient>
                    <radialGradient id="thorG" cx="38%" cy="28%" r="62%">
                      <stop offset="0%" stop-color="#E86030"/>
                      <stop offset="50%" stop-color="#C03018"/>
                      <stop offset="100%" stop-color="#721408"/>
                    </radialGradient>
                    <radialGradient id="headG" cx="42%" cy="32%" r="60%">
                      <stop offset="0%" stop-color="#F07040"/>
                      <stop offset="45%" stop-color="#CC3A1A"/>
                      <stop offset="100%" stop-color="#721408"/>
                    </radialGradient>
                    <radialGradient id="eyeW" cx="35%" cy="30%" r="60%">
                      <stop offset="0%" stop-color="#ffffff"/>
                      <stop offset="100%" stop-color="#c8e8ff"/>
                    </radialGradient>
                    <radialGradient id="pupG" cx="30%" cy="28%" r="55%">
                      <stop offset="0%" stop-color="#5888CC"/>
                      <stop offset="40%" stop-color="#1C3A80"/>
                      <stop offset="100%" stop-color="#060C22"/>
                    </radialGradient>
                    <radialGradient id="cheekG" cx="50%" cy="50%" r="50%">
                      <stop offset="0%" stop-color="#FF7A5A" stop-opacity="0.8"/>
                      <stop offset="100%" stop-color="#CC3018" stop-opacity="0"/>
                    </radialGradient>
                    <radialGradient id="shadowG" cx="50%" cy="50%" r="50%">
                      <stop offset="0%" stop-color="#00000040"/>
                      <stop offset="100%" stop-color="#00000000"/>
                    </radialGradient>
                  </defs>

                  <!-- Ground shadow -->
                  <ellipse cx="340" cy="345" rx="260" ry="16" fill="url(#shadowG)"/>

                  <!-- ABDOMEN -->
                  <ellipse cx="148" cy="210" rx="100" ry="72" fill="url(#abdG)" transform="rotate(-5,148,210)"/>
                  <ellipse cx="118" cy="178" rx="38" ry="26" fill="#ffffff28" transform="rotate(-5,118,178)"/>
                  <ellipse cx="112" cy="172" rx="18" ry="12" fill="#ffffff20" transform="rotate(-5,112,172)"/>
                  <path d="M90,188 Q148,205 206,192" stroke="#88180880" stroke-width="2.5" fill="none"/>
                  <path d="M80,218 Q148,236 216,222" stroke="#88180860" stroke-width="2.5" fill="none"/>
                  <path d="M88,248 Q148,262 208,250" stroke="#88180850" stroke-width="2" fill="none"/>
                  <ellipse cx="148" cy="240" rx="85" ry="30" fill="#6E120820" transform="rotate(-5,148,240)"/>

                  <!-- Petiole (waist between abdomen and thorax) -->
                  <ellipse cx="258" cy="218" rx="18" ry="14" fill="url(#abdG2)"/>
                  <ellipse cx="253" cy="212" rx="7" ry="5" fill="#ffffff18"/>

                  <!-- THORAX -->
                  <ellipse cx="318" cy="198" rx="52" ry="42" fill="url(#thorG)"/>
                  <ellipse cx="300" cy="180" rx="22" ry="18" fill="#ffffff1e" transform="rotate(-10,300,180)"/>

                  <!-- LEGS -->
                  <g stroke-linecap="round" fill="none">
                    <line x1="352" y1="210" x2="390" y2="250" stroke="#C03018" stroke-width="6"/>
                    <line x1="390" y1="250" x2="430" y2="300" stroke="#C03018" stroke-width="5"/>
                    <line x1="355" y1="216" x2="398" y2="257" stroke="#A82810" stroke-width="5.5"/>
                    <line x1="398" y1="257" x2="444" y2="308" stroke="#A82810" stroke-width="4.5"/>
                    <line x1="310" y1="218" x2="272" y2="262" stroke="#C03018" stroke-width="6"/>
                    <line x1="272" y1="262" x2="248" y2="312" stroke="#C03018" stroke-width="5"/>
                    <line x1="318" y1="223" x2="362" y2="270" stroke="#A82810" stroke-width="5.5"/>
                    <line x1="362" y1="270" x2="382" y2="318" stroke="#A82810" stroke-width="4.5"/>
                    <line x1="265" y1="215" x2="222" y2="260" stroke="#C03018" stroke-width="6"/>
                    <line x1="222" y1="260" x2="195" y2="312" stroke="#C03018" stroke-width="5"/>
                    <line x1="268" y1="221" x2="230" y2="268" stroke="#A82810" stroke-width="5.5"/>
                    <line x1="230" y1="268" x2="210" y2="318" stroke="#A82810" stroke-width="4.5"/>
                  </g>

                  <!-- Leg joints -->
                  <g fill="#C03018">
                    <circle cx="390" cy="250" r="5"/>
                    <circle cx="398" cy="257" r="4.5"/>
                    <circle cx="272" cy="262" r="5"/>
                    <circle cx="362" cy="270" r="4.5"/>
                    <circle cx="222" cy="260" r="5"/>
                    <circle cx="230" cy="268" r="4.5"/>
                  </g>

                  <!-- Feet -->
                  <g fill="#7A1408">
                    <path d="M426,299 Q430,305 436,303 Q432,310 426,307 Q421,312 417,308 Q416,301 426,299Z"/>
                    <path d="M440,307 Q444,313 450,311 Q446,318 440,315 Q435,320 431,316 Q430,309 440,307Z"/>
                    <path d="M244,311 Q248,317 254,315 Q250,322 244,319 Q239,324 235,320 Q234,313 244,311Z"/>
                    <path d="M378,317 Q382,323 388,321 Q384,328 378,325 Q373,330 369,326 Q368,319 378,317Z"/>
                    <path d="M191,311 Q195,317 201,315 Q197,322 191,319 Q186,324 182,320 Q181,313 191,311Z"/>
                    <path d="M206,317 Q210,323 216,321 Q212,328 206,325 Q201,330 197,326 Q196,319 206,317Z"/>
                  </g>

                  <!-- Neck joint (behind head) -->
                  <ellipse cx="372" cy="208" rx="20" ry="15" fill="#C03018"/>

                  <!-- HEAD -->
                  <circle cx="420" cy="195" r="58" fill="url(#headG)"/>
                  <ellipse cx="400" cy="172" rx="22" ry="26" fill="#ffffff1e" transform="rotate(-15,400,172)"/>
                  <ellipse cx="396" cy="168" rx="10" ry="12" fill="#ffffff16"/>

                  <!-- Left eye -->
                  <ellipse cx="406" cy="186" rx="20" ry="22" fill="url(#eyeW)"/>
                  <circle cx="408" cy="187" r="14" fill="url(#pupG)"/>
                  <circle cx="408" cy="187" r="7" fill="#060C22"/>
                  <circle cx="401" cy="180" r="6" fill="#ffffff"/>
                  <circle cx="412" cy="190" r="2.5" fill="#ffffff80"/>
                  <ellipse cx="406" cy="186" rx="20" ry="22" fill="none" stroke="#8B1A08" stroke-width="2"/>

                  <!-- Right eye -->
                  <ellipse cx="438" cy="182" rx="20" ry="22" fill="url(#eyeW)"/>
                  <circle cx="440" cy="183" r="14" fill="url(#pupG)"/>
                  <circle cx="440" cy="183" r="7" fill="#060C22"/>
                  <circle cx="433" cy="176" r="6" fill="#ffffff"/>
                  <circle cx="444" cy="186" r="2.5" fill="#ffffff80"/>
                  <ellipse cx="438" cy="182" rx="20" ry="22" fill="none" stroke="#8B1A08" stroke-width="2"/>

                  <!-- Cheeks -->
                  <ellipse cx="394" cy="208" rx="14" ry="10" fill="url(#cheekG)"/>
                  <ellipse cx="450" cy="204" rx="14" ry="10" fill="url(#cheekG)"/>

                  <!-- Smile -->
                  <path d="M406,218 Q422,230 440,219" stroke="#8B1A08" stroke-width="3" stroke-linecap="round" fill="none"/>

                  <!-- Antennae -->
                  <path id="antenna-l" d="M410,140 C404,118 390,96 376,74" stroke="#A02A10" stroke-width="4" stroke-linecap="round" fill="none" style="transition: transform 0.3s ease; transform-origin: 410px 140px;"/>
                  <path id="antenna-r" d="M436,137 C444,115 458,95 470,76" stroke="#A02A10" stroke-width="4" stroke-linecap="round" fill="none" style="transition: transform 0.3s ease; transform-origin: 436px 137px;"/>
                  <circle cx="376" cy="74" r="9" fill="#E06030"/>
                  <circle cx="470" cy="76" r="9" fill="#E06030"/>
                  <circle cx="372" cy="70" r="3.5" fill="#ffffff60"/>
                  <circle cx="466" cy="72" r="3.5" fill="#ffffff60"/>
                  
                  <!-- Hattu (Indiana Jones tyyli) - Scaled and moved for new head -->
                  <g id="hat" transform="translate(365, 115) scale(0.8)">
                      <ellipse cx="65" cy="38" rx="45" ry="10" fill="#D84315"/>
                      <path d="M35 38 C35 38 40 5 65 5 C90 5 95 38 95 38" fill="#BF360C"/>
                      <rect x="38" y="32" width="54" height="6" fill="#3E2723"/>
                  </g>
                </svg>
            </div>
        </div>

        <div class="content-area">
            
            <div id="view-start" class="view active">
                <h2>Seikkailijatesti</h2>
                <h1>Minkälainen kansainvälisen nuorisotyön seikkailija olet?</h1>
                <p>Matka alkaa tästä. Vastaa kysymyksiin ja löydä oma roolisi!</p>
                <button class="btn" onclick="app.startQuiz()">Aloita matka</button>
            </div>

            <div id="view-question" class="view">
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <h2 id="question-counter">Etappi 1 / 5</h2>
                <h1 id="question-text">Kysymys latautuu...</h1>
                <div id="options-container"></div>
            </div>

            <div id="view-result" class="view">
                <div class="result-card">
                    <h2 id="result-label">Tuloksesi:</h2>
                    <h1 id="result-title">Hahmo</h1>
                    <p id="result-desc">Kuvaus...</p>
                    <p id="result-illustration" class="illustration-credit"></p>
                    
                    <div class="result-extra">
                        <h3>Lisätietoa:</h3>
                        <p id="result-info">...</p>
                    </div>

                    <div class="qr-container" id="qr-code-container"></div>
                    <button class="btn" onclick="app.restart()">Aloita alusta ↻</button>
                    
                    <div class="logo-grid">
                        <img src="../assets/images/OPH_Su_Ru_vaaka_RGB.png" alt="OPH">
                        <img src="../assets/images/Erasmus+_Su_Ru_En.png" alt="Erasmus+">
                        <img src="../assets/images/Solidaarisuusjoukot_logo_Su_En_Ru.png" alt="Solidarity Corps">
                        <img src="../assets/images/Eurodesk_Su_Ru_En.png" alt="Eurodesk">
                    </div>
                </div>
            </div>

        </div>

        <footer style="padding: 20px; text-align: center; border-top: 1px solid #eee;">
            <a href="../tietosuoja.html" style="color: #666; text-decoration: none; font-size: 14px;">Tietosuojaseloste</a> | 
            <a href="saavutettavuus.html" style="color: #666; text-decoration: none; font-size: 14px;">Saavutettavuusseloste</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../js/script.js?v=2"></script>
</body>
</html>
